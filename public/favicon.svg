<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="50%" stop-color="#0c0a09"/>
      <stop offset="100%" stop-color="#030201"/>
    </linearGradient>

    <!-- Gold Accent Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="35%" stop-color="#facc15"/>
      <stop offset="70%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>

    <!-- Inner Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#f59e0b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Squircle App Icon Base -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8"/>
  
  <!-- Outer Gold Accent Ring -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-opacity="0.4"/>

  <!-- Center Dumbbell Icon Graphic -->
  <g transform="translate(256, 256) rotate(-45) translate(-256, -256)" filter="url(#shadow)">
    <!-- Main Center Bar -->
    <rect x="110" y="238" width="292" height="36" rx="18" fill="url(#goldGrad)" />
    <rect x="170" y="244" width="172" height="24" rx="12" fill="#09090b" opacity="0.25" />

    <!-- Left Weight Plates -->
    <!-- Outer Plate -->
    <rect x="130" y="146" width="36" height="220" rx="14" fill="url(#goldGrad)" />
    <rect x="136" y="152" width="10" height="208" rx="5" fill="#fef08a" opacity="0.6" />

    <!-- Inner Plate -->
    <rect x="180" y="176" width="28" height="160" rx="10" fill="url(#goldGrad)" />
    
    <!-- Collar Ring -->
    <rect x="218" y="216" width="18" height="80" rx="6" fill="#facc15" />

    <!-- Right Weight Plates -->
    <!-- Inner Plate -->
    <rect x="276" y="216" width="18" height="80" rx="6" fill="#facc15" />

    <rect x="304" y="176" width="28" height="160" rx="10" fill="url(#goldGrad)" />

    <!-- Outer Plate -->
    <rect x="346" y="146" width="36" height="220" rx="14" fill="url(#goldGrad)" />
    <rect x="352" y="152" width="10" height="208" rx="5" fill="#fef08a" opacity="0.6" />
  </g>

  <!-- TAF Dynamic Flame Accent Tag -->
  <path d="M 256 90 C 270 120, 290 135, 290 160 C 290 185, 270 200, 256 200 C 242 200, 222 185, 222 160 C 222 135, 242 120, 256 90 Z" fill="url(#goldGrad)" opacity="0.95" filter="url(#glow)"/>
</svg>