<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Header Logo Gradient (from-amber-500 to-yellow-400) -->
    <linearGradient id="headerLogoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>

    <!-- Subtle Shadow -->
    <filter id="logoShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#f59e0b" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded Square Container (rounded-xl equivalent) -->
  <rect width="512" height="512" rx="112" fill="url(#headerLogoGrad)" filter="url(#logoShadow)"/>

  <!-- Lucide Dumbbell Icon in Dark Zinc (#09090b) -->
  <g transform="translate(56, 56) scale(16.666)" fill="none" stroke="#09090b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="m6.5 6.5 11 11"/>
    <path d="m21 21-1-1"/>
    <path d="m3 3 1 1"/>
    <path d="m18 22 4-4"/>
    <path d="m2 6 4-4"/>
    <path d="m3 10 7-7"/>
    <path d="m14 21 7-7"/>
  </g>
</svg>